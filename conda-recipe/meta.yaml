package:
  name: tfbs-footprinting3
  version: "0.0.7"

source:
  path: ..

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"

requirements:
  host:
    - python >=3.7
    - pip
  run:
    - python >=3.7
    - numpy
    - matplotlib
    - biopython
    - msgpack-python
    - wget
    - pandas
    - httplib2

about:
  home: https://github.com/thirtysix/TFBS_footprinting3
  license: MIT
  license_family: MIT
  summary: "Tool for identifying conserved TFBSs in vertebrate species."

extra:
  recipe-maintainers:
    - your-anaconda-username

